<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thư viện truyện VSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>📚 Thư viện truyện</h1>

<input 
  type="text" 
  id="search" 
  placeholder="🔍 Tìm truyện..." 
  onkeyup="searchStory()"
/>

<div id="book-list"></div>


  <!-- Khu đọc truyện -->
  <div id="reader" class="hidden">
    <button onclick="goBack()">⬅ Quay lại</button>
    <h2 id="story-title"></h2>
    <p id="story-content"></p>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
